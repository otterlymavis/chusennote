name: Postgres

on:
  push:
    paths:
      - chusennote/**
      - tests/**
      - requirements.txt
      - .github/workflows/postgres.yml
  pull_request:
    paths:
      - chusennote/**
      - tests/**
      - requirements.txt
      - .github/workflows/postgres.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chusennote
          POSTGRES_PASSWORD: chusennote
          POSTGRES_DB: chusennote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chusennote"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CHUSENNOTE_TEST_DATABASE_URL: postgresql://chusennote:chusennote@localhost:5432/chusennote
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install pytest pytest-asyncio "psycopg[binary]"
      - name: Run the Postgres backend test
        run: python -m pytest tests/test_lottery_monitor.py -k postgres_backend -v
