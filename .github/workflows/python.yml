name: Python

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install test tooling
        run: python -m pip install pytest pytest-asyncio
      - name: Run tests
        run: python -m pytest
